version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: vmkos_mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: vmkos
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: vmkos_backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://admin:admin123@mongodb:27017/vmkos?authSource=admin
      - JWT_SECRET=vmk_os_super_secret_key_2024
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: vmkos_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:5000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongo_data: